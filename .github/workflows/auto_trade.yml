name: 세븐 스플릿 자동 매매 (Seven Split Auto Trading)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: '실제 주문 차단 (테스트 모드)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      mode:
        description: '실행 모드'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - analysis_only

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 패키지 설치
        run: pip install -r requirements.txt

      - name: 런타임 디렉토리 생성
        run: mkdir -p logs data

      - name: 자동 매매 봇 실행
        env:
          KISTOCK_APP_KEY: ${{ secrets.KISTOCK_APP_KEY }}
          KISTOCK_APP_SECRET: ${{ secrets.KISTOCK_APP_SECRET }}
          KISTOCK_ACCOUNT: ${{ secrets.KISTOCK_ACCOUNT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
          ENABLE_LIVE_TRADING: ${{ vars.ENABLE_LIVE_TRADING || 'false' }}
          TRADING_ENV: ${{ vars.TRADING_ENV || 'demo' }}
          SPLIT_N: ${{ vars.SPLIT_N || '7' }}
          STOP_LOSS_PCT: ${{ vars.STOP_LOSS_PCT || '-15' }}
          TAKE_PROFIT: ${{ vars.TAKE_PROFIT || '30' }}
          RSI_BUY: ${{ vars.RSI_BUY || '30' }}
          RSI_SELL: ${{ vars.RSI_SELL || '70' }}
          TOTAL_CAPITAL: ${{ vars.TOTAL_CAPITAL || '10000000' }}
          MAX_POSITIONS: ${{ vars.MAX_POSITIONS || '3' }}
          MAX_SINGLE_WEIGHT: ${{ vars.MAX_SINGLE_WEIGHT || '0.30' }}
          CASH_BUFFER: ${{ vars.CASH_BUFFER || '0.20' }}
          MAX_DAILY_LOSS_PCT: ${{ vars.MAX_DAILY_LOSS_PCT || '3.0' }}
          LOG_FILE: logs/trade-${{ github.run_number }}.log
        run: python -m src.trader 2>&1 | tee "$LOG_FILE"

      - name: 커밋 및 푸시 (DB 동기화)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin database
          git checkout database
          cp data/trades.json trades.json || echo "[]" > trades.json
          git add trades.json
          git commit -m "chore: 자동매매 DB 업데이트 [skip ci]" || true
          git push origin database

      - name: 실행 로그 및 데이터 백업 (Artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: trade-log-${{ github.run_number }}
          path: |
            logs/
            data/
          retention-days: 30
          if-no-files-found: warn
